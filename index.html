<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CardLab - Digital Card</title>

  <!-- 폰트 -->
  <link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', sans-serif;
    }

    body {
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(270deg, #6a5cff, #3c7dff, #6a5cff);
      background-size: 600% 600%;
      animation: gradientMove 10s ease infinite;
    }

    @keyframes gradientMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      width: 90%;
      max-width: 380px;
      padding: 30px 25px;
      border-radius: 20px;
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      text-align: center;
      color: #fff;
    }

    .profile {
      width: 90px;
      height: 90px;
      margin: 0 auto 20px;
      border-radius: 50%;
      background: #ccc;
    }

    .name {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .job {
      font-size: 14px;
      opacity: 0.8;
      margin-bottom: 20px;
    }

    .phone {
      font-size: 16px;
      margin-bottom: 15px;
    }

    .message {
      font-size: 14px;
      opacity: 0.85;
      margin-bottom: 25px;
      line-height: 1.4;
    }

    .btn {
      display: block;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      background: rgba(255,255,255,0.2);
      color: #fff;
      text-decoration: none;
      font-size: 14px;
      transition: 0.3s;
    }

    .btn:hover {
      background: rgba(255,255,255,0.35);
    }

    @media (max-width: 480px) {
      .card {
        padding: 25px 20px;
      }
    }
  </style>
</head>

<body>

  <div class="card">
    
    <div class="profile"></div>

    <div class="name">이도헌</div>
    <div class="job">Authentic Planner</div>

    <div class="phone">📞 010-3099-3774</div>

    <div class="message">
      고객과의 소통<br>
      그게 우선입니다.
    </div>

    <a href="https://www.instagram.com/idoheon_?igsh=Zjk3a284dTRlMzQz" target="_blank" class="btn">
      Instagram 보기
    </a>

  </div>

</body>
</html>
